<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">ServiceNow LEAP to Ansible Automation Platform via MCP</title>
  <desc id="desc">Reference topology: ServiceNow LEAP connects over HTTPS through an ingress tier to the Ansible Automation Platform MCP server, which calls Automation Controller; automation targets managed endpoints.</desc>
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f3f4f6"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#fafafa"/>
  <text x="460" y="36" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#111827">Reference: ServiceNow LEAP + Ansible MCP + Automation Controller</text>
  <text x="460" y="58" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="12" fill="#6b7280">Trust zones: SaaS ITSM | Integration tier | Automation platform | Targets</text>

  <!-- Zone labels -->
  <text x="115" y="92" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9ca3af">ITSM / SaaS</text>
  <text x="345" y="92" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9ca3af">Integration</text>
  <text x="575" y="92" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9ca3af">Automation platform</text>
  <text x="805" y="92" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#9ca3af">Infrastructure</text>

  <!-- Box helper -->
  <!-- ServiceNow -->
  <rect x="40" y="108" width="150" height="88" rx="6" fill="url(#boxGrad)" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="115" y="138" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">ServiceNow</text>
  <text x="115" y="158" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#4b5563">LEAP / Connectors</text>
  <text x="115" y="178" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#6b7280">Assistant UI</text>

  <!-- Ingress -->
  <rect x="270" y="108" width="150" height="88" rx="6" fill="url(#boxGrad)" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="345" y="138" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">Ingress</text>
  <text x="345" y="158" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#4b5563">API GW / WAF</text>
  <text x="345" y="178" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#6b7280">TLS, allow lists</text>

  <!-- MCP -->
  <rect x="500" y="108" width="150" height="88" rx="6" fill="url(#boxGrad)" stroke="#c53030" stroke-width="2"/>
  <text x="575" y="133" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">AAP MCP server</text>
  <text x="575" y="155" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#4b5563">Model Context Protocol</text>
  <text x="575" y="175" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#6b7280">Maps LEAP ’ Controller</text>

  <!-- Controller -->
  <rect x="500" y="238" width="150" height="92" rx="6" fill="url(#boxGrad)" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="575" y="268" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">Automation</text>
  <text x="575" y="286" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">Controller</text>
  <text x="575" y="308" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#6b7280">RBAC, audit, jobs</text>

  <!-- Targets -->
  <rect x="730" y="168" width="150" height="110" rx="6" fill="url(#boxGrad)" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="805" y="208" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">Managed</text>
  <text x="805" y="226" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#111827">endpoints</text>
  <text x="805" y="248" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#4b5563">Inventory + EE</text>
  <text x="805" y="266" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#6b7280">SSH / WinRM / APIs</text>

  <!-- Arrows horizontal -->
  <line x1="190" y1="152" x2="265" y2="152" stroke="#374151" stroke-width="2" marker-end="url(#arrowHead)"/>
  <text x="228" y="142" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#374151">HTTPS</text>

  <line x1="420" y1="152" x2="495" y2="152" stroke="#374151" stroke-width="2" marker-end="url(#arrowHead)"/>
  <text x="458" y="142" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#374151">HTTPS</text>

  <!-- MCP to Controller vertical -->
  <line x1="575" y1="196" x2="575" y2="233" stroke="#374151" stroke-width="2" marker-end="url(#arrowHead)"/>
  <text x="595" y="218" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#374151">REST</text>

  <!-- Controller to targets -->
  <line x1="650" y1="284" x2="725" y2="230" stroke="#374151" stroke-width="2" marker-end="url(#arrowHead)"/>
  <text x="690" y="248" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#374151">Automation</text>

  <!-- Credential vault hint -->
  <rect x="40" y="238" width="380" height="72" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="230" y="262" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#92400e">Integration identity</text>
  <text x="230" y="282" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#78350f">AAP API token / OAuth secret in ServiceNow credential store · rotate · scope to allowed job templates</text>

  <!-- Footer note -->
  <text x="460" y="390" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="10" fill="#9ca3af">Not to scale  adapt network zones and HA pairs to your organization&apos;s standards.</text>
</svg>
