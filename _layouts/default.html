    <!--[if !IE]><script>fixScale(document);</script><![endif]-->

    <!-- Copy-to-clipboard buttons for code blocks -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('pre').forEach(function(pre) {
          var wrapper = document.createElement('div');
          wrapper.style.position = 'relative';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          var btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = 'Copy';
          btn.setAttribute('aria-label', 'Copy code to clipboard');
          wrapper.appendChild(btn);

          btn.addEventListener('click', function() {
            var code = pre.querySelector('code');
            var text = code ? code.textContent : pre.textContent;
            navigator.clipboard.writeText(text).then(function() {
              btn.textContent = 'Copied!';
              btn.classList.add('copy-btn--success');
              setTimeout(function() {
                btn.textContent = 'Copy';
                btn.classList.remove('copy-btn--success');
              }, 2000);
            });
          });
        });
      });
    </script>

    <!-- Hamburger menu toggle -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('header-hamburger');
        var nav = document.getElementById('header-nav');
        if (!btn || !nav) return;
        btn.addEventListener('click', function() {
          nav.classList.toggle('header-nav--open');
          var icon = btn.querySelector('i');
          if (nav.classList.contains('header-nav--open')) {
            icon.className = 'fas fa-times';
          } else {
            icon.className = 'fas fa-bars';
          }
        });
      });
    </script>

    <!-- Collapsible sidebar filter on mobile -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var sidebar = document.querySelector('.cards-sidebar');
        var header = document.querySelector('.cards-sidebar__header');
        if (!sidebar || !header) return;
        header.addEventListener('click', function(e) {
          if (e.target.id === 'filter-clear') return;
          if (window.innerWidth <= 768) {
            sidebar.classList.toggle('sidebar--open');
          }
        });
      });
    </script>

    <!-- Active nav link indicator -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var path = window.location.pathname.replace(/\/$/, '').replace(/\/index\.html$/, '');
        document.querySelectorAll('.header-link').forEach(function(link) {
          var href = link.getAttribute('href').replace(/\/$/, '');
          if (path === href || (href !== '{{ "/" | relative_url }}'.replace(/\/$/, '') && path.indexOf(href) === 0)) {
            link.classList.add('header-link--active');
          }
        });
      });
    </script>

    <!-- Guide sidebar navigation (auto-generated TOC) -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var section = document.querySelector('.wrapper > section');
        if (!section) return;

        var isIndex = window.location.pathname === '{{ "/" | relative_url }}'
          || window.location.pathname === '{{ "/" | relative_url }}index.html'
          || document.querySelector('.cards-layout');
        if (isIndex) return;

        var headings = section.querySelectorAll('h2[id]');
        if (headings.length < 2) return;

        var sidebar = document.createElement('aside');
        sidebar.className = 'guide-sidebar';

        var backLink = document.createElement('a');
        backLink.href = '{{ "/" | relative_url }}';
        backLink.className = 'guide-sidebar__back';
        backLink.innerHTML = '<i class="fas fa-arrow-left"></i> Back to Solution Guides';
        sidebar.appendChild(backLink);

        var nav = document.createElement('nav');
        nav.className = 'guide-sidebar__nav';
        var title = document.createElement('span');
        title.className = 'guide-sidebar__title';
        title.textContent = 'On this page';
        nav.appendChild(title);

        var ul = document.createElement('ul');
        ul.className = 'guide-sidebar__list';
        headings.forEach(function(h) {
          if (h.textContent.trim() === '') return;
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#' + h.id;
          a.className = 'guide-sidebar__link';
          a.textContent = h.textContent.replace(/\s+/g, ' ').trim();
          li.appendChild(a);
          ul.appendChild(li);
        });
        nav.appendChild(ul);
        sidebar.appendChild(nav);

        var wrapper = document.createElement('div');
        wrapper.className = 'guide-layout';
        section.parentNode.insertBefore(wrapper, section);
        wrapper.appendChild(sidebar);
        wrapper.appendChild(section);

        var activeLink = null;
        var sidebarLinks = ul.querySelectorAll('.guide-sidebar__link');
        function updateActive() {
          var scrollPos = window.scrollY + 100;
          var current = null;
          headings.forEach(function(h) {
            if (h.offsetTop <= scrollPos) current = h.id;
          });
          sidebarLinks.forEach(function(link) {
            if (link.getAttribute('href') === '#' + current) {
              link.classList.add('guide-sidebar__link--active');
            } else {
              link.classList.remove('guide-sidebar__link--active');
            }
          });
        }
        window.addEventListener('scroll', updateActive);
        updateActive();
      });
    </script>

    <!-- External links open in new tabs -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var host = window.location.hostname;
        document.querySelectorAll('a[href]').forEach(function(link) {
          if (link.hostname && link.hostname !== host) {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
          }
        });
      });
    </script>

    <!-- Konami Code Easter Egg -->
    <img id="konami-easter-egg" style="
      position: fixed;
      width: 300px;
      height: auto;
      z-index: 99999;
      pointer-events: none;
      display: none;
    "/>
    <script>
      (function() {
        var konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
        var konamiIndex = 0;
        var easterEggImages = [
          '{{ "/assets/images/nuno-way-out.png" | relative_url }}',
          '{{ "/assets/images/roger-that.png" | relative_url }}',
          '{{ "/assets/images/leo-sticker.png" | relative_url }}'
        ];

        document.addEventListener('keydown', function(e) {
          if (e.key === konamiCode[konamiIndex]) {
            konamiIndex++;
            if (konamiIndex === konamiCode.length) {
              konamiIndex = 0;
              launchEasterEgg();
            }
          } else {
            konamiIndex = 0;
          }
        });

        function launchEasterEgg() {
          var img = document.getElementById('konami-easter-egg');
          img.src = easterEggImages[Math.floor(Math.random() * easterEggImages.length)];
          var viewH = window.innerHeight;
          var startY = Math.random() * (viewH - 350);

          img.style.display = 'block';
          img.style.left = '-320px';
          img.style.top = startY + 'px';
          img.style.transform = 'rotate(0deg)';
          img.style.transition = 'none';

          var bounceCount = 0;
          var maxBounces = 3;
          var posX = -320;
          var posY = startY;
          var velX = 4.8 + Math.random() * 1.6;
          var velY = -(4.8 + Math.random() * 2.4);
          var gravity = 0.32;
          var rotation = 0;
          var spin = 4.8 + Math.random() * 4.8;
          var screenW = window.innerWidth;

          function animate() {
            posX += velX;
            velY += gravity;
            posY += velY;
            rotation += spin;

            // Bounce off the bottom
            if (posY > viewH - 300) {
              posY = viewH - 300;
              velY = -(Math.abs(velY) * 0.7);
              bounceCount++;
              spin *= 0.8;
            }

            img.style.left = posX + 'px';
            img.style.top = posY + 'px';
            img.style.transform = 'rotate(' + rotation + 'deg)';

            if (posX < screenW + 400) {
              requestAnimationFrame(animate);
            } else {
              img.style.display = 'none';
            }
          }

          requestAnimationFrame(animate);
        }
      })();
    </script>
  </body>
